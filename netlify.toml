[build]
  publish = "."
  functions = "netlify/functions"

# Decap CMS GitHub OAuth (must stay above catch-all style rules)
[[redirects]]
  from = "/auth"
  to = "/.netlify/functions/auth"
  status = 200
  force = true

[[redirects]]
  from = "/callback"
  to = "/.netlify/functions/callback"
  status = 200
  force = true

# Trailing slash for /admin (Decap uses hash routing — do NOT rewrite /admin/* or config.yml breaks)
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

# Repair bookmarked bad CMS URLs created when site_url lacked https://
[[redirects]]
  from = "/admin/astonemwambaportfolio.netlify.app"
  to = "/admin/"
  status = 301
  force = true

[[redirects]]
  from = "/admin/astonemwambaportfolio.netlify.app/*"
  to = "/admin/"
  status = 301
  force = true

# Netlify Forms — contact form success redirect (optional)
[[redirects]]
  from = "/contact-success"
  to = "/index.html?form_status=success#contact"
  status = 302

# Clean URLs for content pages
[[redirects]]
  from = "/achievements"
  to = "/achievements.html"
  status = 200

[[redirects]]
  from = "/achievements/"
  to = "/achievements.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/blog/"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/achievement-post"
  to = "/achievement-post.html"
  status = 200

[[redirects]]
  from = "/achievement"
  to = "/achievement-post.html"
  status = 301
