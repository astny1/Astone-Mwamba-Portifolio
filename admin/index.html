    <script>
        // Repair old broken bookmarks: /admin/yourdomain.netlify.app
        (function () {
            var path = window.location.pathname.replace(/\/+$/, '') || '/';
            if (path !== '/admin' && path.indexOf('/admin/') === 0) {
                window.location.replace('/admin/' + (window.location.hash || '#/'));
            }
        })();
    </script>
</head>
